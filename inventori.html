<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inventori Gudang — Kopi Telu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--brown:#92400e;--amber:#b45309;--light:#fffbf5;--card:#fff;--border:#e5d8c8;--text:#1c1410;--muted:#7a6652;--green:#059669;--red:#dc2626;--blue:#2563eb;--orange:#ea580c}
    body{font-family:'DM Sans',sans-serif;background:var(--light);color:var(--text);min-height:100vh}
    header{background:var(--brown);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px #92400e44}
    .header-left{display:flex;align-items:center;gap:10px}
    .logo{width:32px;height:32px;background:#78350f;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
    .app-name{font-family:'DM Serif Display',serif;font-size:17px}
    .btn-link{color:#fcd34d;font-size:13px;cursor:pointer;background:none;border:none;text-decoration:none}
    .user-badge{background:#78350f;padding:3px 10px;border-radius:99px;font-size:12px;color:#fff}
    main{max-width:900px;margin:0 auto;padding:16px;display:flex;flex-direction:column;gap:14px;padding-bottom:40px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px}
    .card-title{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:14px}
    /* Nav tabs */
    .page-nav{background:var(--card);border-bottom:1px solid var(--border);display:flex;overflow-x:auto}
    .nav-tab{padding:12px 16px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border:none;background:none;border-bottom:2.5px solid transparent;font-family:'DM Sans',sans-serif;white-space:nowrap}
    .nav-tab.active{color:var(--brown);border-bottom-color:var(--brown)}
    /* Stats */
    .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
    @media(max-width:600px){
      .stat-grid{grid-template-columns:repeat(2,1fr)}
      .item-row{flex-wrap:wrap;gap:8px}
      .stok-bar-wrap{width:80px}
      .badge-stok{display:none}
      main{padding:10px}
      .card{padding:12px}
      .search-bar{font-size:14px}
    }
    .stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;border-left:4px solid}
    .stat-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
    .stat-value{font-family:'DM Serif Display',serif;font-size:22px}
    /* Item list */
    .item-row{display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border);transition:background .15s}
    .item-row:last-child{border-bottom:none}
    .item-row:hover{background:var(--light)}
    .item-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
    .item-info{flex:1;min-width:0}
    .item-nama{font-size:14px;font-weight:600}
    .item-meta{font-size:11px;color:var(--muted);margin-top:2px}
    .stok-bar-wrap{width:100px;flex-shrink:0}
    .stok-bar{height:6px;border-radius:3px;background:#e5d8c8;overflow:hidden;margin-bottom:3px}
    .stok-bar-fill{height:100%;border-radius:3px;transition:width .3s}
    .stok-text{font-size:11px;font-weight:600;text-align:right}
    .stok-ok{color:var(--green)}
    .stok-warn{color:var(--orange)}
    .stok-critical{color:var(--red)}
    .badge-stok{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px}
    .badge-ok{background:#d1fae5;color:#065f46}
    .badge-warn{background:#fef3c7;color:#92400e}
    .badge-critical{background:#fef2f2;color:#991b1b}
    .btn-sm{border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
    .btn-primary{background:var(--brown);color:#fff}
    .btn-primary:hover{background:var(--amber)}
    .btn-secondary{background:var(--light);border:1.5px solid var(--border);color:var(--text)}
    .btn-secondary:hover{border-color:var(--amber)}
    /* Modal */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;justify-content:center}
    .modal-overlay.show{display:flex}
    @media(min-width:560px){.modal-overlay{align-items:center}}
    .modal{background:var(--card);border-radius:20px 20px 0 0;padding:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
    @media(min-width:560px){.modal{border-radius:20px}}
    .modal-title{font-family:'DM Serif Display',serif;font-size:18px;margin-bottom:16px}
    .form-group{margin-bottom:12px}
    .form-group label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:4px}
    .form-group input,.form-group select,.form-group textarea{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:9px 12px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);background:#fafaf8;outline:none}
    .form-group input:focus,.form-group select:focus{border-color:var(--amber);background:#fff}
    .btn-full{width:100%;padding:13px;font-size:14px;font-weight:700;border:none;border-radius:12px;cursor:pointer;font-family:'DM Sans',sans-serif;background:var(--brown);color:#fff;margin-top:4px}
    .btn-full:hover{background:var(--amber)}
    .btn-full:disabled{background:#d1b89a;cursor:not-allowed}
    .empty-state{text-align:center;padding:40px;color:var(--muted);font-size:13px}
    .search-bar{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:9px 12px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;background:#fafaf8}
    .search-bar:focus{border-color:var(--amber)}
    .msg-error{background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:8px 12px;font-size:12px;color:var(--red);margin-bottom:10px;display:none}
    .msg-success{background:#f0fdf4;border:1px solid #6ee7b7;border-radius:8px;padding:8px 12px;font-size:12px;color:var(--green);margin-bottom:10px;display:none}
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">☕</div>
    <span class="app-name">Inventori Gudang</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <span class="user-badge" id="user-badge">-</span>
    <a href="dashboard.html" id="link-dashboard" style="display:none" class="btn-link">📊 Dashboard</a>
    <button class="btn-link" onclick="doLogout()">Keluar →</button>
  </div>
</header>

<!-- Tab Nav -->
<nav class="page-nav">
  <button class="nav-tab active" onclick="switchTab('stok')">📦 Stok Barang</button>
  <button class="nav-tab" onclick="switchTab('kirim')">🚚 Kirim ke Outlet</button>
  <button class="nav-tab" onclick="switchTab('riwayat')">📋 Riwayat Pengiriman</button>
</nav>

<main>
  <!-- ===== TAB STOK ===== -->
  <div id="tab-stok">
    <!-- Stats -->
    <div class="stat-grid">
      <div class="stat-card" style="border-left-color:var(--blue)">
        <div class="stat-label">Total Item</div>
        <div class="stat-value" id="s-total" style="color:var(--blue)">-</div>
        <div style="font-size:11px;color:var(--muted)">jenis barang</div>
      </div>
      <div class="stat-card" style="border-left-color:var(--green)">
        <div class="stat-label">Stok Aman</div>
        <div class="stat-value" id="s-aman" style="color:var(--green)">-</div>
        <div style="font-size:11px;color:var(--muted)">item</div>
      </div>
      <div class="stat-card" style="border-left-color:var(--orange)">
        <div class="stat-label">Stok Menipis</div>
        <div class="stat-value" id="s-warn" style="color:var(--orange)">-</div>
        <div style="font-size:11px;color:var(--muted)">item</div>
      </div>
      <div class="stat-card" style="border-left-color:var(--red)">
        <div class="stat-label">Stok Kritis</div>
        <div class="stat-value" id="s-critical" style="color:var(--red)">-</div>
        <div style="font-size:11px;color:var(--muted)">item</div>
      </div>
    </div>

    <!-- Actions -->
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <input class="search-bar" id="search-item" placeholder="🔍 Cari item..." oninput="filterItems()" style="flex:1;min-width:180px"/>
      <button class="btn-sm btn-primary" onclick="openModalTambahItem()">+ Tambah Item</button>
      <button class="btn-sm btn-secondary" onclick="openModalStokMasuk()">📥 Stok Masuk</button>
      <button class="btn-sm btn-secondary" onclick="kirimTelegram()" id="btn-telegram" style="display:none">📲 Kirim Alert</button>
    </div>

    <!-- Item list -->
    <div class="card" style="padding:0;overflow:hidden">
      <div id="item-list"><div class="empty-state">Memuat...</div></div>
    </div>
  </div>

  <!-- ===== TAB KIRIM ===== -->
  <div id="tab-kirim" style="display:none">
    <div class="card">
      <div class="card-title">🚚 Buat Pengiriman ke Outlet</div>
      <div class="msg-error" id="kirim-error"></div>
      <div class="msg-success" id="kirim-success"></div>

      <div class="form-group">
        <label>Outlet Tujuan</label>
        <select id="kirim-outlet">
          <option value="">-- Pilih Outlet --</option>
        </select>
      </div>

      <div class="form-group">
        <label>Catatan (opsional)</label>
        <input type="text" id="kirim-catatan" placeholder="Contoh: Pengiriman mingguan"/>
      </div>

      <div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <label style="font-size:12px;font-weight:600;color:var(--muted)">Item yang Dikirim</label>
          <button class="btn-sm btn-secondary" onclick="tambahItemKirim()">+ Tambah Item</button>
        </div>
        <div id="kirim-items"></div>
      </div>

      <button class="btn-full" onclick="submitKiriman()">🚚 Buat Pengiriman</button>
    </div>
  </div>

  <!-- ===== TAB RIWAYAT ===== -->
  <div id="tab-riwayat" style="display:none">
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px">
      <select id="filter-outlet-riwayat" style="border:1.5px solid var(--border);border-radius:10px;padding:7px 12px;font-size:13px;font-family:'DM Sans',sans-serif;background:#fafaf8" onchange="loadRiwayat()">
        <option value="all">Semua Outlet</option>
      </select>
      <select id="filter-status-riwayat" style="border:1.5px solid var(--border);border-radius:10px;padding:7px 12px;font-size:13px;font-family:'DM Sans',sans-serif;background:#fafaf8" onchange="loadRiwayat()">
        <option value="all">Semua Status</option>
        <option value="pending">⏳ Belum Dikonfirmasi</option>
        <option value="confirmed">✅ Sudah Dikonfirmasi</option>
        <option value="partial">⚠️ Ada Selisih</option>
      </select>
    </div>
    <div id="riwayat-list"><div class="empty-state">Memuat...</div></div>
  </div>
</main>

<!-- Modal Tambah Item -->
<div class="modal-overlay" id="modal-tambah-item" onclick="if(event.target===this)closeAllModals()">
  <div class="modal">
    <div class="modal-title">+ Tambah Item Baru</div>
    <div class="msg-error" id="tambah-error"></div>
    <div class="form-group">
      <label>Nama Item</label>
      <input type="text" id="item-nama" placeholder="Contoh: Biji Kopi Arabica"/>
    </div>
    <div class="form-group">
      <label>Satuan</label>
      <input type="text" id="item-satuan" placeholder="Contoh: kg, liter, pcs, pack, box"/>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="form-group">
        <label>Stok Awal</label>
        <input type="number" id="item-stok" placeholder="0" min="0" step="0.1"/>
      </div>
      <div class="form-group">
        <label>Stok Minimum (Alert)</label>
        <input type="number" id="item-min" placeholder="0" min="0" step="0.1"/>
      </div>
    </div>
    <div class="form-group">
      <label>Kategori</label>
      <select id="item-kategori">
        <option value="bahan">🫘 Bahan Baku</option>
        <option value="kemasan">📦 Kemasan</option>
        <option value="operasional">🔧 Operasional</option>
        <option value="lainnya">📋 Lainnya</option>
      </select>
    </div>
    <button class="btn-full" id="btn-tambah-item" onclick="submitTambahItem()">Simpan Item</button>
  </div>
</div>

<!-- Modal Stok Masuk -->
<div class="modal-overlay" id="modal-stok-masuk" onclick="if(event.target===this)closeAllModals()">
  <div class="modal">
    <div class="modal-title">📥 Stok Masuk dari Supplier</div>
    <div class="msg-error" id="stok-masuk-error"></div>
    <div class="form-group">
      <label>Item</label>
      <select id="stok-masuk-item"></select>
    </div>
    <div class="form-group">
      <label>Jumlah Masuk</label>
      <input type="number" id="stok-masuk-jumlah" placeholder="0" min="0" step="0.1"/>
    </div>
    <div class="form-group">
      <label>Catatan (opsional)</label>
      <input type="text" id="stok-masuk-catatan" placeholder="Nama supplier, no. faktur, dll"/>
    </div>
    <button class="btn-full" id="btn-stok-masuk" onclick="submitStokMasuk()">📥 Simpan Stok Masuk</button>
  </div>
</div>

<!-- Modal Detail Pengiriman -->
<div class="modal-overlay" id="modal-detail-kirim" onclick="if(event.target===this)closeAllModals()">
  <div class="modal">
    <div class="modal-title">📦 Detail Pengiriman</div>
    <div id="detail-kirim-content"></div>
    <button class="btn-full btn-secondary" onclick="closeAllModals()" style="background:var(--light);color:var(--text);border:1.5px solid var(--border);margin-top:8px">Tutup</button>
  </div>
</div>

<script type="module">
  import { Auth, OutletManager } from './js/auth.js';
  import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
  import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, query, where, orderBy, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

  const user = Auth.requireAuth('inventori');
  if (!user) throw new Error();

  document.getElementById('user-badge').textContent = user.nama;
  window.doLogout = () => Auth.logout();
  if (user.role === 'owner') document.getElementById('link-dashboard').style.display = 'inline';

  const firebaseConfig = {
    apiKey: "AIzaSyAx4RfDW-UdkFf3m_wQuSdeptqssE7n2wU",
    authDomain: "cafe-shift-report-70c6c.firebaseapp.com",
    projectId: "cafe-shift-report-70c6c",
    storageBucket: "cafe-shift-report-70c6c.firebasestorage.app",
    messagingSenderId: "461174765046",
    appId: "1:461174765046:web:660d43de856294644343d7"
  };
  const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const TELEGRAM_TOKEN = '8613637829:AAERHEyn8KfJRcJIDra-w3h-kgYcS29WhMQ';
  const TELEGRAM_CHAT  = '7202941698';

  const KATEGORI_ICON = { bahan:'🫘', kemasan:'📦', operasional:'🔧', lainnya:'📋' };

  let allItems = [];
  let allOutlets = [];
  let outletMap = {};
  let kirimItems = [];

  // Init
  async function init() {
    allOutlets = await OutletManager.getAll();
    outletMap = Object.fromEntries(allOutlets.map(o => [o.id, o.nama]));

    // Populate outlet selects
    ['kirim-outlet','filter-outlet-riwayat'].forEach(id => {
      const sel = document.getElementById(id);
      if (!sel) return;
      allOutlets.forEach(o => {
        const opt = document.createElement('option');
        opt.value = o.id; opt.textContent = o.nama;
        sel.appendChild(opt);
      });
    });

    await loadItems();
    await loadRiwayat();
  }
  init();

  // ===== ITEMS =====
  async function loadItems() {
    const snap = await getDocs(query(collection(db, "inventori"), orderBy("nama")));
    allItems = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderItems(allItems);
    updateStats();
    updateStokMasukSelect();

    // Tampilkan tombol alert kalau ada yang kritis/menipis
    const alertItems = allItems.filter(i => i.stok <= i.minStok);
    document.getElementById('btn-telegram').style.display = alertItems.length ? 'inline-block' : 'none';
  }

  function updateStats() {
    const total    = allItems.length;
    const critical = allItems.filter(i => i.stok <= 0).length;
    const warn     = allItems.filter(i => i.stok > 0 && i.stok <= i.minStok).length;
    const aman     = allItems.filter(i => i.stok > i.minStok).length;
    document.getElementById('s-total').textContent    = total;
    document.getElementById('s-aman').textContent     = aman;
    document.getElementById('s-warn').textContent     = warn;
    document.getElementById('s-critical').textContent = critical;
  }

  function getStokStatus(item) {
    if (item.stok <= 0) return 'critical';
    if (item.stok <= item.minStok) return 'warn';
    return 'ok';
  }

  function renderItems(items) {
    const list = document.getElementById('item-list');
    if (!items.length) {
      list.innerHTML = '<div class="empty-state">Belum ada item. Klik "+ Tambah Item" untuk mulai.</div>';
      return;
    }

    // Sort: critical dulu, lalu warn, lalu ok
    const sorted = [...items].sort((a,b) => {
      const order = { critical:0, warn:1, ok:2 };
      return order[getStokStatus(a)] - order[getStokStatus(b)];
    });

    list.innerHTML = sorted.map(item => {
      const status = getStokStatus(item);
      const pct = item.minStok > 0 ? Math.min(100, (item.stok / (item.minStok * 2)) * 100) : 100;
      const barColor = status === 'ok' ? '#10b981' : status === 'warn' ? '#f59e0b' : '#ef4444';
      const icon = KATEGORI_ICON[item.kategori] || '📋';

      return `<div class="item-row">
        <div class="item-icon" style="background:${status==='critical'?'#fef2f2':status==='warn'?'#fffbeb':'#f0fdf4'}">${icon}</div>
        <div class="item-info">
          <div class="item-nama">${item.nama}</div>
          <div class="item-meta">Min: ${item.minStok} ${item.satuan} · ${item.kategori||'lainnya'}</div>
        </div>
        <div class="stok-bar-wrap">
          <div class="stok-bar"><div class="stok-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
          <div class="stok-text stok-${status}">${item.stok} ${item.satuan}</div>
        </div>
        <span class="badge-stok badge-${status}" style="margin:0 8px">
          ${status==='critical'?'🔴 Habis':status==='warn'?'🟡 Menipis':'🟢 Aman'}
        </span>
        <button class="btn-sm btn-secondary" onclick="openEditItem('${item.id}')">Edit</button>
      </div>`;
    }).join('');
  }

  window.filterItems = function() {
    const q = document.getElementById('search-item').value.toLowerCase();
    const filtered = allItems.filter(i => i.nama.toLowerCase().includes(q));
    renderItems(filtered);
  };

  // Modal tambah item
  window.openModalTambahItem = function() {
    document.getElementById('item-nama').value = '';
    document.getElementById('item-satuan').value = '';
    document.getElementById('item-stok').value = '0';
    document.getElementById('item-min').value = '0';
    document.getElementById('tambah-error').style.display = 'none';
    document.getElementById('modal-tambah-item').classList.add('show');
  };

  window.submitTambahItem = async function() {
    const nama     = document.getElementById('item-nama').value.trim();
    const satuan   = document.getElementById('item-satuan').value.trim();
    const stok     = parseFloat(document.getElementById('item-stok').value) || 0;
    const minStok  = parseFloat(document.getElementById('item-min').value) || 0;
    const kategori = document.getElementById('item-kategori').value;

    const errEl = document.getElementById('tambah-error');
    if (!nama || !satuan) { errEl.style.display='block'; errEl.textContent='Nama dan satuan wajib diisi!'; return; }
    errEl.style.display = 'none';

    const btn = document.getElementById('btn-tambah-item');
    btn.disabled = true; btn.textContent = '⏳ Menyimpan...';

    try {
      await addDoc(collection(db, "inventori"), {
        nama, satuan, stok, minStok, kategori,
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
      });
      closeAllModals();
      await loadItems();
    } catch(e) { errEl.style.display='block'; errEl.textContent='Error: '+e.message; }
    finally { btn.disabled=false; btn.textContent='Simpan Item'; }
  };

  // Edit item
  window.openEditItem = function(id) {
    const item = allItems.find(i => i.id === id);
    if (!item) return;
    document.getElementById('item-nama').value    = item.nama;
    document.getElementById('item-satuan').value  = item.satuan;
    document.getElementById('item-stok').value    = item.stok;
    document.getElementById('item-min').value     = item.minStok;
    document.getElementById('item-kategori').value = item.kategori || 'bahan';
    document.getElementById('tambah-error').style.display = 'none';

    const btn = document.getElementById('btn-tambah-item');
    btn.textContent = 'Update Item';
    btn.onclick = async () => {
      btn.disabled = true; btn.textContent = '⏳ Menyimpan...';
      try {
        await updateDoc(doc(db, "inventori", id), {
          nama: document.getElementById('item-nama').value.trim(),
          satuan: document.getElementById('item-satuan').value.trim(),
          stok: parseFloat(document.getElementById('item-stok').value)||0,
          minStok: parseFloat(document.getElementById('item-min').value)||0,
          kategori: document.getElementById('item-kategori').value,
          updatedAt: new Date().toISOString()
        });
        closeAllModals();
        await loadItems();
        btn.onclick = window.submitTambahItem;
        btn.textContent = 'Simpan Item';
      } catch(e) { document.getElementById('tambah-error').style.display='block'; document.getElementById('tambah-error').textContent='Error: '+e.message; }
      finally { btn.disabled=false; }
    };
    document.getElementById('modal-tambah-item').classList.add('show');
  };

  // Stok masuk
  function updateStokMasukSelect() {
    const sel = document.getElementById('stok-masuk-item');
    sel.innerHTML = '<option value="">-- Pilih Item --</option>';
    allItems.forEach(i => {
      const opt = document.createElement('option');
      opt.value = i.id; opt.textContent = `${i.nama} (${i.stok} ${i.satuan})`;
      sel.appendChild(opt);
    });
  }

  window.openModalStokMasuk = function() {
    document.getElementById('stok-masuk-jumlah').value = '';
    document.getElementById('stok-masuk-catatan').value = '';
    document.getElementById('stok-masuk-error').style.display = 'none';
    document.getElementById('modal-stok-masuk').classList.add('show');
  };

  window.submitStokMasuk = async function() {
    const itemId = document.getElementById('stok-masuk-item').value;
    const jumlah = parseFloat(document.getElementById('stok-masuk-jumlah').value) || 0;
    const catatan = document.getElementById('stok-masuk-catatan').value.trim();
    const errEl = document.getElementById('stok-masuk-error');

    if (!itemId) { errEl.style.display='block'; errEl.textContent='Pilih item!'; return; }
    if (jumlah <= 0) { errEl.style.display='block'; errEl.textContent='Jumlah harus lebih dari 0!'; return; }
    errEl.style.display = 'none';

    const btn = document.getElementById('btn-stok-masuk');
    btn.disabled = true; btn.textContent = '⏳ Menyimpan...';

    try {
      const item = allItems.find(i => i.id === itemId);
      const stokBaru = (item.stok || 0) + jumlah;

      await updateDoc(doc(db, "inventori", itemId), { stok: stokBaru, updatedAt: new Date().toISOString() });
      await addDoc(collection(db, "inventori_log"), {
        type: 'masuk', itemId, itemNama: item.nama, satuan: item.satuan,
        jumlah, stokSebelum: item.stok, stokSesudah: stokBaru,
        catatan, inputBy: user.nama, createdAt: new Date().toISOString()
      });

      closeAllModals();
      await loadItems();
    } catch(e) { errEl.style.display='block'; errEl.textContent='Error: '+e.message; }
    finally { btn.disabled=false; btn.textContent='📥 Simpan Stok Masuk'; }
  };

  // ===== KIRIM KE OUTLET =====
  window.tambahItemKirim = function() {
    // Simpan nilai yang sudah diisi dulu
    saveKirimValues();
    kirimItems.push({ itemId: '', jumlah: 0 });
    renderKirimItems();
  };

  function saveKirimValues() {
    kirimItems.forEach((ki, idx) => {
      const sel = document.querySelector(`#kirim-row-${idx} select`);
      const inp = document.querySelector(`#kirim-row-${idx} input`);
      if (sel) ki.itemId = sel.value;
      if (inp) ki.jumlah = parseFloat(inp.value) || 0;
    });
  }

  function renderKirimItems() {
    const container = document.getElementById('kirim-items');
    if (!kirimItems.length) {
      container.innerHTML = '<div style="text-align:center;padding:16px;color:var(--muted);font-size:13px">Belum ada item. Klik "+ Tambah Item"</div>';
      return;
    }
    container.innerHTML = kirimItems.map((ki, idx) => `
      <div id="kirim-row-${idx}" style="display:flex;flex-direction:column;gap:6px;margin-bottom:10px;padding:10px;background:var(--light);border-radius:10px;border:1px solid var(--border)">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <span style="font-size:11px;font-weight:600;color:var(--muted)">Item ${idx+1}</span>
          <button onclick="removeKirimItem(${idx})" style="background:none;border:none;color:var(--red);font-size:16px;cursor:pointer;padding:0">×</button>
        </div>
        <select onchange="kirimItems[${idx}].itemId=this.value" style="width:100%;border:1.5px solid var(--border);border-radius:10px;padding:8px 10px;font-size:13px;font-family:'DM Sans',sans-serif;background:#fff">
          <option value="">-- Pilih Item --</option>
          ${allItems.map(i => `<option value="${i.id}" ${ki.itemId===i.id?'selected':''}>${i.nama} (stok: ${i.stok} ${i.satuan})</option>`).join('')}
        </select>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="number" placeholder="Jumlah" value="${ki.jumlah||''}" min="0" step="0.1"
            onchange="kirimItems[${idx}].jumlah=parseFloat(this.value)||0"
            style="flex:1;border:1.5px solid var(--border);border-radius:10px;padding:8px 10px;font-size:13px;font-family:'DM Sans',sans-serif;background:#fff"/>
          <span style="font-size:12px;color:var(--muted);white-space:nowrap">${ki.itemId ? (allItems.find(i=>i.id===ki.itemId)?.satuan||'') : 'satuan'}</span>
        </div>
      </div>
    `).join('');
  }

  window.removeKirimItem = function(idx) {
    saveKirimValues();
    kirimItems.splice(idx, 1);
    renderKirimItems();
  };

  window.submitKiriman = async function() {
    // Simpan nilai terkini dari DOM dulu
    saveKirimValues();

    const outlet  = document.getElementById('kirim-outlet').value;
    const catatan = document.getElementById('kirim-catatan').value.trim();
    const errEl   = document.getElementById('kirim-error');
    const succEl  = document.getElementById('kirim-success');

    errEl.style.display = 'none'; succEl.style.display = 'none';

    if (!outlet) { errEl.style.display='block'; errEl.textContent='Pilih outlet tujuan!'; return; }
    if (!kirimItems.length || kirimItems.some(i => !i.itemId || i.jumlah <= 0)) {
      errEl.style.display='block'; errEl.textContent='Lengkapi semua item dan jumlahnya!'; return;
    }

    // Cek stok cukup
    for (const ki of kirimItems) {
      const item = allItems.find(i => i.id === ki.itemId);
      if (item.stok < ki.jumlah) {
        errEl.style.display='block';
        errEl.textContent=`Stok ${item.nama} tidak cukup! (stok: ${item.stok} ${item.satuan})`;
        return;
      }
    }

    const btn = document.querySelector('#tab-kirim .btn-full');
    btn.disabled = true; btn.textContent = '⏳ Menyimpan...';

    try {
      const now = new Date();
      const tanggal = now.toISOString().split('T')[0];
      const outletNama = outletMap[outlet] || outlet;

      // Simpan pengiriman
      const kirimData = {
        outlet, outletNama, catatan, tanggal,
        items: kirimItems.map(ki => {
          const item = allItems.find(i => i.id === ki.itemId);
          return { itemId: ki.itemId, itemNama: item.nama, satuan: item.satuan, jumlah: ki.jumlah, jumlahDiterima: null };
        }),
        status: 'pending',
        createdBy: user.nama,
        createdAt: now.toISOString(),
        createdAtWIB: now.toLocaleString('id-ID', { timeZone: 'Asia/Jakarta', hour12: false })
      };
      const ref = await addDoc(collection(db, "pengiriman"), kirimData);

      // Kurangi stok
      for (const ki of kirimItems) {
        const item = allItems.find(i => i.id === ki.itemId);
        const stokBaru = item.stok - ki.jumlah;
        await updateDoc(doc(db, "inventori", ki.itemId), { stok: stokBaru, updatedAt: now.toISOString() });
        await addDoc(collection(db, "inventori_log"), {
          type: 'kirim', itemId: ki.itemId, itemNama: item.nama, satuan: item.satuan,
          jumlah: ki.jumlah, stokSebelum: item.stok, stokSesudah: stokBaru,
          pengirimanId: ref.id, outlet, outletNama,
          inputBy: user.nama, createdAt: now.toISOString()
        });
      }

      // Notif Telegram
      try {
        const itemList = kirimItems.map(ki => {
          const item = allItems.find(i => i.id === ki.itemId);
          return `  • ${item.nama}: ${ki.jumlah} ${item.satuan}`;
        }).join('\n');
        const pesan = `🚚 *PENGIRIMAN BARANG*\n\n🏪 Tujuan: *${outletNama}*\n📅 ${tanggal.split('-').reverse().join('/')}\n\n📦 *Item Dikirim:*\n${itemList}${catatan?'\n\n📝 '+catatan:''}\n\n_Dikirim oleh: ${user.nama}_\n⏳ Menunggu konfirmasi outlet`;
        await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chat_id: TELEGRAM_CHAT, text: pesan, parse_mode: 'Markdown' })
        });
      } catch(e) { console.warn('Telegram gagal:', e); }

      // Cek stok menipis setelah pengiriman
      await cekStokAlert();

      kirimItems = [];
      renderKirimItems();
      document.getElementById('kirim-outlet').value = '';
      document.getElementById('kirim-catatan').value = '';
      succEl.style.display='block'; succEl.textContent='✅ Pengiriman berhasil dibuat!';
      await loadItems();
      setTimeout(() => { succEl.style.display='none'; switchTab('riwayat'); }, 2000);
    } catch(e) { errEl.style.display='block'; errEl.textContent='Error: '+e.message; }
    finally { btn.disabled=false; btn.textContent='🚚 Buat Pengiriman'; }
  };

  // Cek stok alert dan kirim Telegram
  async function cekStokAlert() {
    const alertItems = allItems.filter(i => i.stok <= i.minStok && i.minStok > 0);
    if (!alertItems.length) return;

    const itemList = alertItems.map(i =>
      `  ${i.stok <= 0 ? '🔴' : '🟡'} ${i.nama}: ${i.stok} ${i.satuan} (min: ${i.minStok} ${i.satuan})`
    ).join('\n');

    try {
      await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          chat_id: TELEGRAM_CHAT,
          text: `⚠️ *ALERT STOK GUDANG*\n\n${alertItems.length} item perlu direstok:\n\n${itemList}\n\n_Segera hubungi supplier!_`,
          parse_mode: 'Markdown'
        })
      });
    } catch(e) { console.warn('Alert telegram gagal:', e); }
  }

  window.kirimTelegram = cekStokAlert;

  // ===== RIWAYAT =====
  window.loadRiwayat = async function() {
    const outletFilter = document.getElementById('filter-outlet-riwayat').value;
    const statusFilter = document.getElementById('filter-status-riwayat').value;
    const list = document.getElementById('riwayat-list');
    list.innerHTML = '<div class="empty-state">⏳ Memuat...</div>';

    try {
      let constraints = [orderBy("createdAt", "desc")];
      if (outletFilter !== 'all') constraints.push(where("outlet", "==", outletFilter));
      if (statusFilter !== 'all') constraints.push(where("status", "==", statusFilter));

      const snap = await getDocs(query(collection(db, "pengiriman"), ...constraints));
      const pengiriman = snap.docs.map(d => ({ id: d.id, ...d.data() }));

      if (!pengiriman.length) {
        list.innerHTML = '<div class="empty-state">Belum ada riwayat pengiriman</div>';
        return;
      }

      list.innerHTML = pengiriman.map(p => {
        const statusIcon = p.status === 'confirmed' ? '✅' : p.status === 'partial' ? '⚠️' : '⏳';
        const statusText = p.status === 'confirmed' ? 'Dikonfirmasi' : p.status === 'partial' ? 'Ada Selisih' : 'Menunggu Konfirmasi';
        const statusColor = p.status === 'confirmed' ? 'var(--green)' : p.status === 'partial' ? 'var(--orange)' : 'var(--amber)';
        const itemSummary = (p.items||[]).map(i => `${i.itemNama}: ${i.jumlah} ${i.satuan}`).join(', ');

        return `<div class="card" style="margin-bottom:10px;padding:14px;cursor:pointer" onclick="showDetailKirim('${p.id}')">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px">
            <div style="flex:1">
              <div style="font-size:14px;font-weight:600">${p.outletNama||p.outlet}</div>
              <div style="font-size:11px;color:var(--muted);margin-top:2px">📅 ${p.tanggal?.split('-').reverse().join('/')||'-'} · 👤 ${p.createdBy||'-'} · ${p.createdAtWIB||'-'}</div>
              <div style="font-size:12px;color:var(--muted);margin-top:4px">📦 ${itemSummary}</div>
              ${p.catatan?`<div style="font-size:11px;color:var(--muted);margin-top:2px;font-style:italic">📝 ${p.catatan}</div>`:''}
            </div>
            <div style="text-align:right;flex-shrink:0">
              <div style="font-size:13px;font-weight:600;color:${statusColor}">${statusIcon} ${statusText}</div>
              ${p.confirmedAtWIB?`<div style="font-size:10px;color:var(--muted);margin-top:2px">${p.confirmedAtWIB}</div>`:''}
            </div>
          </div>
        </div>`;
      }).join('');
    } catch(e) { list.innerHTML = `<div class="empty-state">Error: ${e.message}</div>`; }
  };

  window.showDetailKirim = async function(id) {
    const snap = await getDoc(doc(db, "pengiriman", id));
    if (!snap.exists()) return;
    const p = { id: snap.id, ...snap.data() };

    const statusIcon = p.status === 'confirmed' ? '✅' : p.status === 'partial' ? '⚠️' : '⏳';
    const statusText = p.status === 'confirmed' ? 'Dikonfirmasi' : p.status === 'partial' ? 'Ada Selisih' : 'Menunggu Konfirmasi';

    document.getElementById('detail-kirim-content').innerHTML = `
      <div style="margin-bottom:14px">
        <div style="font-size:13px;font-weight:600">${p.outletNama||p.outlet}</div>
        <div style="font-size:12px;color:var(--muted)">${p.tanggal?.split('-').reverse().join('/')||'-'} · ${p.createdBy||'-'}</div>
        <div style="font-size:12px;font-weight:600;margin-top:6px">${statusIcon} ${statusText}</div>
        ${p.confirmedBy?`<div style="font-size:11px;color:var(--muted)">Dikonfirmasi oleh: ${p.confirmedBy} pada ${p.confirmedAtWIB||'-'}</div>`:''}
        ${p.catatanKonfirmasi?`<div style="font-size:11px;color:var(--orange);margin-top:4px">📝 ${p.catatanKonfirmasi}</div>`:''}
      </div>
      <table style="width:100%;border-collapse:collapse;font-size:13px">
        <thead>
          <tr style="border-bottom:2px solid var(--border)">
            <th style="text-align:left;padding:6px 8px;font-size:11px;color:var(--muted)">Item</th>
            <th style="text-align:center;padding:6px 8px;font-size:11px;color:var(--muted)">Dikirim</th>
            <th style="text-align:center;padding:6px 8px;font-size:11px;color:var(--muted)">Diterima</th>
            <th style="text-align:center;padding:6px 8px;font-size:11px;color:var(--muted)">Selisih</th>
          </tr>
        </thead>
        <tbody>
          ${(p.items||[]).map(i => {
            const selisih = i.jumlahDiterima !== null && i.jumlahDiterima !== undefined ? i.jumlahDiterima - i.jumlah : null;
            return `<tr style="border-bottom:1px solid var(--border)">
              <td style="padding:8px">${i.itemNama}</td>
              <td style="text-align:center;padding:8px">${i.jumlah} ${i.satuan}</td>
              <td style="text-align:center;padding:8px">${i.jumlahDiterima !== null && i.jumlahDiterima !== undefined ? i.jumlahDiterima+' '+i.satuan : '-'}</td>
              <td style="text-align:center;padding:8px;color:${selisih===null?'var(--muted)':selisih===0?'var(--green)':'var(--red)'}">${selisih===null?'-':selisih===0?'✅':selisih>0?'+'+selisih:selisih}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    `;
    document.getElementById('modal-detail-kirim').classList.add('show');
  };

  // Tab switching
  window.switchTab = function(tab) {
    ['stok','kirim','riwayat'].forEach(t => {
      document.getElementById('tab-'+t).style.display = t===tab ? 'flex' : 'none';
      if (t===tab) document.getElementById('tab-'+t).style.flexDirection = 'column';
    });
    document.querySelectorAll('.nav-tab').forEach((el,i) => {
      el.classList.toggle('active', ['stok','kirim','riwayat'][i]===tab);
    });
    if (tab === 'riwayat') loadRiwayat();
  };

  window.closeAllModals = function() {
    document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('show'));
  };
</script>
</body>
</html>
