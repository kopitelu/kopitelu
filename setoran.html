<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Laporan Setoran — Kopi Telu Report</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--brown:#92400e;--amber:#b45309;--light:#fffbf5;--card:#fff;--border:#e5d8c8;--text:#1c1410;--muted:#7a6652;--green:#059669;--red:#dc2626;--blue:#2563eb}
    body{font-family:'DM Sans',sans-serif;background:var(--light);color:var(--text);min-height:100vh}
    header{background:var(--brown);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px #92400e44}
    .header-left{display:flex;align-items:center;gap:10px}
    .logo{width:32px;height:32px;background:#78350f;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
    .app-name{font-family:'DM Serif Display',serif;font-size:17px}
    .header-right{display:flex;align-items:center;gap:10px;font-size:13px}
    .user-badge{background:#78350f;padding:3px 10px;border-radius:99px;font-size:12px}
    .btn-link{color:#fcd34d;font-size:13px;cursor:pointer;background:none;border:none;text-decoration:none}
    /* Nav tabs */
    .page-nav{background:var(--card);border-bottom:1px solid var(--border);display:flex}
    .nav-tab{flex:1;padding:12px;text-align:center;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border:none;background:none;border-bottom:2.5px solid transparent;font-family:'DM Sans',sans-serif;transition:all .2s;text-decoration:none;display:block}
    .nav-tab.active{color:var(--brown);border-bottom-color:var(--brown)}
    main{max-width:560px;margin:0 auto;padding:12px;display:flex;flex-direction:column;gap:10px;padding-bottom:20px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px}
    .card-title{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px}
    .form-group{margin-bottom:10px}
    .form-group label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:4px}
    .form-group input,.form-group select,.form-group textarea{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:8px 12px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);background:#fafaf8;outline:none;transition:border-color .2s}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--amber);background:#fff}
    .form-group textarea{resize:none;height:56px}
    .input-prefix{position:relative}
    .input-prefix span{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--muted);pointer-events:none}
    .input-prefix input{padding-left:32px}
    .total-box{background:#fffbeb;border:1.5px solid #fde68a;border-radius:12px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;margin-top:4px}
    .total-label{font-size:13px;font-weight:600;color:var(--brown)}
    .total-value{font-family:'DM Serif Display',serif;font-size:22px;color:var(--amber)}
    .btn-submit{width:100%;background:var(--brown);color:#fff;border:none;border-radius:14px;padding:16px;font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;box-shadow:0 4px 16px #92400e33;transition:background .2s}
    .btn-submit:hover{background:var(--amber)}
    .btn-submit:disabled{background:#d1b89a;cursor:not-allowed}
    .success-banner{background:#ecfdf5;border:1.5px solid #6ee7b7;border-radius:14px;padding:16px;display:none;align-items:center;gap:12px}
    .success-banner.show{display:flex}
    /* Riwayat setoran */
    .setoran-item{background:var(--light);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
    .setoran-item-left{flex:1;min-width:0}
    .setoran-outlet{font-size:13px;font-weight:600;color:var(--text)}
    .setoran-meta{font-size:11px;color:var(--muted);margin-top:2px}
    .setoran-bank{display:inline-block;background:#dbeafe;color:#1e40af;font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px;margin-top:4px}
    .setoran-nominal{font-family:'DM Serif Display',serif;font-size:18px;color:var(--blue);white-space:nowrap}
    .empty-state{text-align:center;padding:32px;color:var(--muted);font-size:13px}
    .hint{font-size:11px;color:var(--muted);margin-top:4px}
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">☕</div>
    <span class="app-name">Kopi Telu Report</span>
  </div>
  <div class="header-right">
    <span class="user-badge" id="user-badge">-</span>
    <a href="dashboard.html" id="link-dashboard" style="display:none" class="btn-link">📊 Dashboard</a>
    <button class="btn-link" onclick="doLogout()">Keluar →</button>
  </div>
</header>

<!-- Page Nav -->
<nav class="page-nav">
  <a href="input.html" class="nav-tab">📋 Laporan Shift</a>
  <a href="setoran.html" class="nav-tab active">🏦 Setoran</a>
</nav>

<main>
  <div class="success-banner" id="success-banner">
    <div style="font-size:24px">✅</div>
    <div><strong style="font-size:14px;color:#065f46;display:block">Setoran berhasil dicatat!</strong><span style="font-size:12px;color:#047857">Data sudah masuk ke sistem.</span></div>
  </div>

  <!-- Form Setoran -->
  <div class="card">
    <div class="card-title">🏦 Input Setoran ke Rekening</div>

    <div class="form-group">
      <label>Tanggal Setoran</label>
      <input type="date" id="f-tanggal"/>
      <div class="hint" id="tanggal-display"></div>
    </div>

    <div class="form-group">
      <label>Outlet</label>
      <select id="f-outlet">
        <option value="">-- Memuat outlet... --</option>
      </select>
    </div>

    <div class="form-group">
      <label>Nama Bank / Rekening Tujuan</label>
      <input type="text" id="f-bank" placeholder="Contoh: BCA, BRI, Mandiri..."/>
    </div>

    <div class="form-group">
      <label>Jumlah Setoran (Rp)</label>
      <div class="input-prefix">
        <span>Rp</span>
        <input type="text" inputmode="numeric" id="f-nominal" placeholder="0"/>
      </div>
    </div>

    <div class="total-box">
      <span class="total-label">Total Disetor</span>
      <span class="total-value" id="total-setor-val">Rp 0</span>
    </div>

    <div class="form-group" style="margin-top:14px;margin-bottom:0">
      <label>Catatan (opsional)</label>
      <textarea id="f-catatan" placeholder="Contoh: Setoran harian, slip no. XXXX..."></textarea>
    </div>
  </div>

  <button class="btn-submit" id="btn-submit">🏦 Simpan Setoran</button>

  <!-- Riwayat -->
  <div class="card">
    <div class="card-title">Riwayat Setoran Hari Ini</div>
    <div id="riwayat-list"><div class="empty-state">Memuat...</div></div>
  </div>
</main>

<script type="module">
  import { Auth, OutletManager } from './js/auth.js';
  import { Storage } from './js/firebase.js';

  const user = Auth.requireAuth();
  if (!user) throw new Error();

  document.getElementById('user-badge').textContent = user.nama;
  if (user.role === 'owner') document.getElementById('link-dashboard').style.display = 'inline';
  window.doLogout = () => Auth.logout();

  // Set tanggal hari ini
  const today = new Date();
  const todayStr = today.toISOString().split('T')[0];
  document.getElementById('f-tanggal').value = todayStr;
  updateTanggalDisplay();

  document.getElementById('f-tanggal').addEventListener('change', () => {
    updateTanggalDisplay();
    loadRiwayat();
  });

  function updateTanggalDisplay() {
    const val = document.getElementById('f-tanggal').value;
    if (!val) return;
    const [y,m,d] = val.split('-');
    document.getElementById('tanggal-display').textContent = `📅 ${d}/${m}/${y}`;
  }

  // Load outlets
  async function loadOutlets() {
    const allOutlets = await OutletManager.getAll();
    const sel = document.getElementById('f-outlet');
    sel.innerHTML = '';
    const allowed = user.role === 'owner'
      ? allOutlets.map(o => o.id)
      : (user.outlets || (user.outlet ? [user.outlet] : []));

    allOutlets.filter(o => allowed.includes(o.id)).forEach(o => {
      const opt = document.createElement('option');
      opt.value = o.id; opt.textContent = o.nama;
      sel.appendChild(opt);
    });
    if (allowed.length === 1) { sel.value = allowed[0]; sel.disabled = true; }
  }
  loadOutlets();

  // Auto format nominal
  function parseAngka(val) {
    return parseInt(String(val).replace(/[^\d]/g, '') || '0', 10);
  }
  function fmt(n) { return 'Rp ' + Math.round(n).toLocaleString('id-ID'); }

  const nominalEl = document.getElementById('f-nominal');
  nominalEl.addEventListener('keydown', e => {
    const allowed = ['Backspace','Delete','ArrowLeft','ArrowRight','Tab','Home','End'];
    if (allowed.includes(e.key) || e.ctrlKey || e.metaKey) return;
    if (!/^\d$/.test(e.key)) e.preventDefault();
  });
  nominalEl.addEventListener('input', function() {
    const digits = this.value.replace(/[^\d]/g, '');
    const num = parseInt(digits || '0', 10);
    const formatted = num === 0 ? '' : num.toLocaleString('id-ID');
    const pos = this.selectionStart;
    const prev = this.value.length;
    this.value = formatted;
    const newPos = Math.max(0, pos + (formatted.length - prev));
    this.setSelectionRange(newPos, newPos);
    document.getElementById('total-setor-val').textContent = fmt(num);
  });
  nominalEl.addEventListener('paste', function(e) {
    e.preventDefault();
    const pasted = (e.clipboardData || window.clipboardData).getData('text');
    const num = parseInt(pasted.replace(/[^\d]/g, '') || '0', 10);
    this.value = num === 0 ? '' : num.toLocaleString('id-ID');
    document.getElementById('total-setor-val').textContent = fmt(num);
  });

  // Submit
  document.getElementById('btn-submit').addEventListener('click', async () => {
    const tanggal = document.getElementById('f-tanggal').value;
    const outlet  = document.getElementById('f-outlet').value;
    const bank    = document.getElementById('f-bank').value.trim();
    const nominal = parseAngka(document.getElementById('f-nominal').value);
    const catatan = document.getElementById('f-catatan').value.trim();

    if (!tanggal) { alert('Pilih tanggal!'); return; }
    if (!outlet)  { alert('Pilih outlet!'); return; }
    if (!bank)    { alert('Isi nama bank/rekening tujuan!'); return; }
    if (nominal === 0) { alert('Isi jumlah setoran!'); return; }

    const btn = document.getElementById('btn-submit');
    btn.disabled = true; btn.textContent = '⏳ Menyimpan...';

    try {
      const now = new Date();
      const outletNama = (await OutletManager.getNamesMap())[outlet] || outlet;
      const waktuInput = now.toLocaleString('id-ID', { timeZone: 'Asia/Jakarta', hour12: false });

      await Storage.saveSetoran({
        tanggal, outlet, outletNama, bank, nominal, catatan,
        inputBy: user.username,
        inputByNama: user.nama,
        createdAt: now.toISOString(),
        createdAtWIB: waktuInput
      });

      // Notif Telegram
      try {
        const pesan = `🏦 *SETORAN MASUK*\n\n` +
          `🏪 *${outletNama}*\n` +
          `📅 ${tanggal.split('-').reverse().join('/')}\n` +
          `🕐 ${waktuInput}\n\n` +
          `💰 *Jumlah: ${fmt(nominal)}*\n` +
          `🏦 Bank: ${bank}\n` +
          (catatan ? `📝 _${catatan}_\n` : '') +
          `\n_Diinput oleh: ${user.nama}_`;

        await fetch(`https://api.telegram.org/bot8613637829:AAERHEyn8KfJRcJIDra-w3h-kgYcS29WhMQ/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chat_id: '7202941698', text: pesan, parse_mode: 'Markdown' })
        });
      } catch(e) { console.warn('Telegram gagal:', e); }

      // Reset
      document.getElementById('f-nominal').value = '';
      document.getElementById('f-bank').value = '';
      document.getElementById('f-catatan').value = '';
      document.getElementById('total-setor-val').textContent = 'Rp 0';
      document.getElementById('f-tanggal').value = todayStr;

      const banner = document.getElementById('success-banner');
      banner.classList.add('show');
      window.scrollTo({ top: 0, behavior: 'smooth' });
      setTimeout(() => banner.classList.remove('show'), 4000);
      loadRiwayat();
    } catch(e) {
      alert('Gagal menyimpan: ' + e.message);
    } finally {
      btn.disabled = false; btn.textContent = '🏦 Simpan Setoran';
    }
  });

  // Riwayat hari ini
  async function loadRiwayat() {
    const tanggal = document.getElementById('f-tanggal').value;
    const list = document.getElementById('riwayat-list');
    list.innerHTML = '<div class="empty-state">Memuat...</div>';
    try {
      const outletMap = await OutletManager.getNamesMap();
      const setorans = await Storage.getSetoranByDate(tanggal);

      // Owner lihat semua, pegawai hanya lihat inputan sendiri
      const filtered = user.role === 'owner'
        ? setorans
        : setorans.filter(s => s.inputBy === user.username);

      if (!filtered.length) {
        const msg = user.role === 'owner'
          ? 'Belum ada setoran di tanggal ini'
          : 'Belum ada setoran yang kamu input hari ini';
        list.innerHTML = `<div class="empty-state">${msg}</div>`;
        return;
      }
      list.innerHTML = filtered.map(s => `
        <div class="setoran-item">
          <div class="setoran-item-left">
            <div class="setoran-outlet">${outletMap[s.outlet]||s.outlet}</div>
            <div class="setoran-meta">${s.tanggal.split('-').reverse().join('/')} · ${s.createdAtWIB||'-'}</div>
            <span class="setoran-bank">${s.bank}</span>
            ${s.catatan ? `<div style="font-size:11px;color:var(--muted);margin-top:3px;font-style:italic">${s.catatan}</div>` : ''}
          </div>
          <div class="setoran-nominal">${fmt(s.nominal)}</div>
        </div>`).join('');
    } catch(e) {
      if (e.message && e.message.includes('index')) {
        list.innerHTML = '<div class="empty-state">⏳ Sedang menyiapkan database, coba lagi dalam 1-2 menit</div>';
      } else {
        list.innerHTML = '<div class="empty-state">Belum ada setoran hari ini</div>';
      }
    }
  }

  loadRiwayat();
</script>
</body>
</html>
