<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Konfirmasi Kiriman — Kopi Telu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--brown:#92400e;--amber:#b45309;--light:#fffbf5;--card:#fff;--border:#e5d8c8;--text:#1c1410;--muted:#7a6652;--green:#059669;--red:#dc2626;--orange:#ea580c}
    body{font-family:'DM Sans',sans-serif;background:var(--light);color:var(--text);min-height:100vh}
    header{background:var(--brown);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px #92400e44}
    .header-left{display:flex;align-items:center;gap:10px}
    .logo{width:32px;height:32px;background:#78350f;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
    .app-name{font-family:'DM Serif Display',serif;font-size:17px}
    .btn-link{color:#fcd34d;font-size:13px;cursor:pointer;background:none;border:none;text-decoration:none}
    .user-badge{background:#78350f;padding:3px 10px;border-radius:99px;font-size:12px;color:#fff}
    nav{background:#fff;border-bottom:1px solid var(--border);display:flex}
    .nav-back{flex:1;padding:12px;text-align:center;font-size:13px;font-weight:500;color:var(--muted);border-bottom:2.5px solid transparent;text-decoration:none;font-family:'DM Sans',sans-serif}
    .nav-active{flex:2;padding:12px;text-align:center;font-size:13px;font-weight:500;color:var(--brown);border-bottom:2.5px solid var(--brown);text-decoration:none;font-family:'DM Sans',sans-serif}
    main{max-width:560px;margin:0 auto;padding:16px;display:flex;flex-direction:column;gap:14px;padding-bottom:40px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px}
    .empty-state{text-align:center;padding:40px;color:var(--muted);font-size:13px}
    .kiriman-card{background:var(--card);border:1.5px solid #fde68a;border-radius:14px;padding:16px;margin-bottom:10px}
    .kiriman-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
    .kiriman-title{font-size:14px;font-weight:600}
    .kiriman-meta{font-size:11px;color:var(--muted);margin-top:2px}
    .item-konfirmasi{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
    .item-konfirmasi:last-child{border-bottom:none}
    .item-konfirmasi-nama{flex:1;font-size:13px}
    .item-konfirmasi-dikirim{font-size:12px;color:var(--muted)}
    .input-terima{width:80px;border:1.5px solid var(--border);border-radius:8px;padding:6px 8px;font-size:13px;font-family:'DM Sans',sans-serif;text-align:center}
    .input-terima:focus{border-color:var(--amber);outline:none}
    .btn-konfirmasi{width:100%;background:var(--brown);color:#fff;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:12px}
    .btn-konfirmasi:hover{background:var(--amber)}
    .btn-konfirmasi:disabled{background:#d1b89a;cursor:not-allowed}
    .konfirmasi-section{margin-top:12px}
    .form-group{margin-bottom:10px}
    .form-group label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:4px}
    .form-group textarea{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:8px 12px;font-size:13px;font-family:'DM Sans',sans-serif;resize:none;height:60px;outline:none}
    .form-group textarea:focus{border-color:var(--amber)}
    .confirmed-card{background:var(--card);border:1.5px solid #6ee7b7;border-radius:14px;padding:14px;margin-bottom:10px;opacity:.8}
  </style>
</head>
<body>
<header>
  <div class="header-left">
    <div class="logo">☕</div>
    <span class="app-name">Kopi Telu Report</span>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <span class="user-badge" id="user-badge">-</span>
    <button class="btn-link" onclick="doLogout()">Keluar →</button>
  </div>
</header>

<nav>
  <a href="home.html" class="nav-back">← Menu</a>
  <a href="konfirmasi-kiriman.html" class="nav-active">📦 Konfirmasi Kiriman</a>
</nav>

<main>
  <div>
    <div style="font-family:'DM Serif Display',serif;font-size:20px">📦 Kiriman Barang</div>
    <div style="font-size:12px;color:var(--muted);margin-top:2px" id="outlet-info">-</div>
  </div>

  <!-- Kiriman pending -->
  <div>
    <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">⏳ Belum Dikonfirmasi</div>
    <div id="pending-list"><div class="empty-state">Memuat...</div></div>
  </div>

  <!-- Kiriman sudah dikonfirmasi -->
  <div>
    <div style="font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px">✅ Sudah Dikonfirmasi (7 hari terakhir)</div>
    <div id="confirmed-list"><div class="empty-state">Memuat...</div></div>
  </div>
</main>

<script type="module">
  import { Auth, OutletManager } from './js/auth.js';
  import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
  import { getFirestore, collection, getDocs, doc, updateDoc, query, where, orderBy } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

  const user = Auth.requireAuth();
  if (!user) throw new Error();

  document.getElementById('user-badge').textContent = user.nama;
  window.doLogout = () => Auth.logout();

  const firebaseConfig = {
    apiKey: "AIzaSyAx4RfDW-UdkFf3m_wQuSdeptqssE7n2wU",
    authDomain: "cafe-shift-report-70c6c.firebaseapp.com",
    projectId: "cafe-shift-report-70c6c",
    storageBucket: "cafe-shift-report-70c6c.firebasestorage.app",
    messagingSenderId: "461174765046",
    appId: "1:461174765046:web:660d43de856294644343d7"
  };
  const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const TELEGRAM_TOKEN = '8613637829:AAERHEyn8KfJRcJIDra-w3h-kgYcS29WhMQ';
  const TELEGRAM_CHAT  = '7202941698';

  const outletMap = await OutletManager.getNamesMap();
  const myOutlets = user.outlets || (user.outlet ? [user.outlet] : []);
  // Filter berdasarkan outlet yang dipilih saat login
  const selectedOutlet = user.selectedOutlet;
  const filterOutlets = selectedOutlet ? [selectedOutlet] : myOutlets;
  const outletNamaDisplay = selectedOutlet ? (outletMap[selectedOutlet] || selectedOutlet) : myOutlets.map(o => outletMap[o]||o).join(', ');
  document.getElementById('outlet-info').textContent = outletNamaDisplay || 'Semua Outlet';

  async function loadKiriman() {
    const pendingList   = document.getElementById('pending-list');
    const confirmedList = document.getElementById('confirmed-list');

    try {
      // Ambil semua pengiriman untuk outlet pegawai
      const allSnap = await getDocs(query(
        collection(db, "pengiriman"),
        orderBy("createdAt", "desc")
      ));
      const allPengiriman = allSnap.docs
        .map(d => ({ id: d.id, ...d.data() }))
        .filter(p => filterOutlets.includes(p.outlet));

      const pending   = allPengiriman.filter(p => p.status === 'pending');
      const confirmed = allPengiriman.filter(p => p.status !== 'pending').slice(0, 10);

      // Render pending
      if (!pending.length) {
        pendingList.innerHTML = '<div class="empty-state">🎉 Tidak ada kiriman yang perlu dikonfirmasi</div>';
      } else {
        pendingList.innerHTML = pending.map(p => renderPendingCard(p)).join('');
      }

      // Render confirmed
      if (!confirmed.length) {
        confirmedList.innerHTML = '<div class="empty-state">Belum ada riwayat konfirmasi</div>';
      } else {
        confirmedList.innerHTML = confirmed.map(p => `
          <div class="confirmed-card">
            <div style="display:flex;justify-content:space-between">
              <div>
                <div style="font-size:13px;font-weight:600">📦 Kiriman dari Gudang</div>
                <div style="font-size:11px;color:var(--muted)">${p.tanggal?.split('-').reverse().join('/')||'-'} · ${p.createdBy||'-'}</div>
                <div style="font-size:11px;color:var(--muted);margin-top:2px">${(p.items||[]).map(i=>i.itemNama+': '+i.jumlah+' '+i.satuan).join(', ')}</div>
              </div>
              <div style="font-size:12px;font-weight:600;color:${p.status==='partial'?'var(--orange)':'var(--green)'}">
                ${p.status==='partial'?'⚠️ Ada Selisih':'✅ Sesuai'}
              </div>
            </div>
          </div>`).join('');
      }
    } catch(e) {
      pendingList.innerHTML = `<div class="empty-state">Error: ${e.message}</div>`;
    }
  }

  function renderPendingCard(p) {
    const itemInputs = (p.items||[]).map((item, idx) => `
      <div class="item-konfirmasi">
        <div class="item-konfirmasi-nama">
          <div style="font-weight:500">${item.itemNama}</div>
          <div class="item-konfirmasi-dikirim">Dikirim: ${item.jumlah} ${item.satuan}</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:10px;color:var(--muted);margin-bottom:3px">Diterima</div>
          <input class="input-terima" type="number" id="item-${p.id}-${idx}"
            value="${item.jumlah}" min="0" step="0.1" placeholder="${item.jumlah}"/>
          <div style="font-size:10px;color:var(--muted)">${item.satuan}</div>
        </div>
      </div>`).join('');

    return `<div class="kiriman-card" id="kiriman-${p.id}">
      <div class="kiriman-header">
        <div>
          <div class="kiriman-title">📦 Kiriman dari Gudang</div>
          <div class="kiriman-meta">📅 ${p.tanggal?.split('-').reverse().join('/')||'-'} · 👤 ${p.createdBy||'-'}</div>
          <div class="kiriman-meta">🕐 ${p.createdAtWIB||'-'}</div>
          ${p.catatan?`<div class="kiriman-meta">📝 ${p.catatan}</div>`:''}
        </div>
        <div style="font-size:12px;font-weight:600;color:var(--amber)">⏳ Menunggu</div>
      </div>

      <div style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:6px">Periksa dan isi jumlah yang diterima:</div>
      ${itemInputs}

      <div class="konfirmasi-section">
        <div class="form-group">
          <label>Catatan (opsional — isi jika ada yang kurang/rusak)</label>
          <textarea id="catatan-${p.id}" placeholder="Contoh: Susu 2 pcs rusak, biji kopi kurang 0.5 kg..."></textarea>
        </div>
        <button class="btn-konfirmasi" onclick="konfirmasi('${p.id}', ${JSON.stringify(p.items).replace(/"/g,"'")})">
          ✅ Konfirmasi Terima
        </button>
      </div>
    </div>`;
  }

  window.konfirmasi = async function(pengirimanId, items) {
    const btn = document.querySelector(`#kiriman-${pengirimanId} .btn-konfirmasi`);
    btn.disabled = true; btn.textContent = '⏳ Menyimpan...';

    try {
      const now = new Date();
      const waktuWIB = now.toLocaleString('id-ID', { timeZone: 'Asia/Jakarta', hour12: false });
      const catatan = document.getElementById(`catatan-${pengirimanId}`).value.trim();

      // Ambil jumlah diterima per item
      const updatedItems = items.map((item, idx) => {
        const inputEl = document.getElementById(`item-${pengirimanId}-${idx}`);
        const diterima = parseFloat(inputEl?.value) || 0;
        return { ...item, jumlahDiterima: diterima };
      });

      // Cek apakah ada selisih
      const adaSelisih = updatedItems.some(i => i.jumlahDiterima !== i.jumlah);
      const status = adaSelisih ? 'partial' : 'confirmed';

      await updateDoc(doc(db, "pengiriman", pengirimanId), {
        items: updatedItems,
        status,
        confirmedBy: user.nama,
        confirmedAt: now.toISOString(),
        confirmedAtWIB: waktuWIB,
        catatanKonfirmasi: catatan
      });

      // Notif Telegram ke owner
      try {
        const outletNama = outletMap[items[0]?.outlet] || user.selectedOutlet || '-';
        const itemDetail = updatedItems.map(i => {
          const selisih = i.jumlahDiterima - i.jumlah;
          return `  ${selisih === 0 ? '✅' : '⚠️'} ${i.itemNama}: ${i.jumlahDiterima}/${i.jumlah} ${i.satuan}${selisih !== 0 ? ` (selisih ${selisih > 0 ? '+' : ''}${selisih})` : ''}`;
        }).join('\n');

        const pesan = `${status === 'confirmed' ? '✅' : '⚠️'} *KONFIRMASI KIRIMAN*\n\n` +
          `🏪 Outlet: *${user.selectedOutlet ? outletMap[user.selectedOutlet] : myOutletNames}*\n` +
          `🕐 ${waktuWIB}\n\n` +
          `📦 *Detail:*\n${itemDetail}` +
          `${catatan ? `\n\n📝 ${catatan}` : ''}\n\n` +
          `_Dikonfirmasi oleh: ${user.nama}_`;

        await fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chat_id: TELEGRAM_CHAT, text: pesan, parse_mode: 'Markdown' })
        });
      } catch(e) { console.warn('Telegram gagal:', e); }

      await loadKiriman();
    } catch(e) {
      alert('Gagal konfirmasi: ' + e.message);
      btn.disabled = false; btn.textContent = '✅ Konfirmasi Terima';
    }
  };

  loadKiriman();
</script>
</body>
</html>
